name: 'Setup'
description: 'Checkout repository, setup node, install deps, build'
runs:
    using: 'composite'
    steps:
        - name: Cache turbo build output
          uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #5.0.5
          with:
              path: .turbo
              key: '${{ runner.os }}-turbo-${{ github.sha }}'
              restore-keys: |
                  ${{ runner.os }}-turbo-

        - name: Install pnpm
          uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 #5.0.0
          with:
              version: 10.26.1

        - name: Setup
          uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #6.4.0
          with:
              node-version: 24.11.0
              registry-url: 'https://registry.npmjs.org'
              cache: 'pnpm'

        - name: Install deps
          shell: bash
          run: pnpm install --frozen-lockfile

        - name: Build
          shell: bash
          run: pnpm run build
