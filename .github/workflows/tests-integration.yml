name: Integration Tests
on:
    workflow_call:

jobs:
    integration-tests-linux:
        name: Integration Tests - ${{ matrix.browser }}
        timeout-minutes: 60
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                browser: [chromium, firefox, chrome, edge]
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2

            - name: Setup
              uses: ./.github/actions/setup

            - name: Install playwright
              uses: ./.github/actions/install-playwright

            - name: Run Playwright tests
              run: |
                  pnpm exec playwright test --project=${{ matrix.browser }}
              working-directory: ./packages/integration-tests

            - name: Upload blob report to GitHub Actions Artifacts
              if: ${{ !cancelled() }}
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
              with:
                  name: blob-report-${{ matrix.browser }}-attempt-${{ github.run_attempt }}
                  path: packages/integration-tests/blob-report
                  retention-days: 1

    integration-tests-macos:
        name: Integration Tests - webkit
        timeout-minutes: 60
        runs-on: macos-latest
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2

            - name: Setup
              uses: ./.github/actions/setup

            - name: Install playwright
              uses: ./.github/actions/install-playwright

            - name: Run Playwright tests
              run: |
                  pnpm exec playwright test --project=webkit
              working-directory: ./packages/integration-tests

            - name: Upload blob report to GitHub Actions Artifacts
              if: ${{ !cancelled() }}
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
              with:
                  name: blob-report-webkit-attempt-${{ github.run_attempt }}
                  path: packages/integration-tests/blob-report
                  retention-days: 1

    merge-reports:
        name: Merge playwright reports
        if: ${{ !cancelled() }}
        needs: [integration-tests-linux, integration-tests-macos]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2

            - name: Setup
              uses: ./.github/actions/setup

            - name: Download blob reports from GitHub Actions Artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  path: packages/integration-tests/all-blob-reports
                  pattern: blob-report-*
                  merge-multiple: true

            - name: Merge into HTML Report
              run: pnpm exec playwright merge-reports --reporter html ./all-blob-reports -c playwright.config.ts
              working-directory: ./packages/integration-tests

            - name: Upload HTML report
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
              with:
                  name: playwright-report--attempt-${{ github.run_attempt }}
                  path: packages/integration-tests/playwright-report
                  retention-days: 14

    check-failure:
        name: Check if all integration tests passed
        needs: [integration-tests-linux, integration-tests-macos, merge-reports]
        runs-on: ubuntu-latest
        if: ${{ always() }}
        steps:
            - name: Check if any integration tests failed
              run: |
                  if [ "${{ needs['integration-tests-linux'].result }}" != "success" ] || [ "${{ needs['integration-tests-macos'].result }}" != "success" ]; then
                  echo "One or more integration tests failed."
                  exit 1
                  else
                  echo "All integration tests passed."
                  fi
